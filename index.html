<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Hive Planner</title>

<meta name="theme-color" content="#070806" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Hive Planner" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="shortcut icon" href="favicon.ico" />
<link rel="icon" href="icons/icon-192.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');
  :root { --bg:#070806; --panel:rgba(8,10,8,.86); --line:rgba(178,216,110,.78); --text:#f4ffd6; --muted:#bfd09b; --accent:#9cff59; --danger:#ff6b6b; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; user-select:none; -webkit-user-select:none; overscroll-behavior:none; }
  input, textarea { user-select:text; -webkit-user-select:text; }
  #canvas { width:100vw; height:100vh; display:block; touch-action:none; background:#161810; }
  .bar { position:fixed; left:8px; right:8px; z-index:10; display:flex; gap:6px; flex-wrap:wrap; align-items:center; padding:7px; border:1px solid rgba(180,220,120,.28); background:var(--panel); backdrop-filter:blur(12px); border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,.45); }
  #top { top:max(8px, env(safe-area-inset-top)); }
  #bottom { bottom:max(8px, env(safe-area-inset-bottom)); align-items:center; }

  #splash {
    position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center;
    background:#000;
    color:#fff; transition:opacity .45s ease, visibility .45s ease; overflow:hidden;
  }
  #splash.hidden { opacity:0; visibility:hidden; pointer-events:none; }
  #splash::before {
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(circle at 50% 42%, rgba(39,211,255,.12), transparent 42%),
      radial-gradient(circle at 50% 58%, rgba(255,211,0,.08), transparent 36%),
      radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0 45%, rgba(0,0,0,.55) 75%, #000 100%);
    pointer-events:none;
  }
  #splash::after {
    content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,0) 40%, rgba(0,0,0,.36));
    pointer-events:none;
  }
  #splashCard {
    position:relative; z-index:1; width:min(1060px, calc(100vw - 18px)); padding:16px 8px 20px;
    text-align:center; border-radius:26px; background:transparent;
    filter:drop-shadow(0 24px 38px rgba(0,0,0,.88));
  }
  #splashTitle {
    position:relative; width:min(900px, 94vw); aspect-ratio:1 / 1; margin:clamp(-110px, -8vw, -34px) auto clamp(-120px, -9vw, -42px);
    transform:translateZ(0); will-change:transform; backface-visibility:hidden;
    animation:splashStageBreathe 5.6s ease-in-out 1.8s infinite;
  }
  #splashTitle::before {
    content:""; position:absolute; inset:15% 5% 7%; z-index:-1; border-radius:50%;
    background:radial-gradient(circle, rgba(48,217,255,.24), rgba(255,213,0,.11) 42%, transparent 70%);
    filter:blur(20px); opacity:.78; animation:splashAura 4.2s ease-in-out 1.2s infinite;
  }
  .splashPiece {
    position:absolute; inset:0; width:100%; height:100%; opacity:0;
    transform:translateZ(0); will-change:transform, opacity, filter;
    filter:drop-shadow(0 18px 20px rgba(0,0,0,.72));
  }
  .splashPiece img { display:block; width:100%; height:100%; object-fit:contain; transform:translateZ(0); backface-visibility:hidden; }
  .splashOof {
    transform-origin:49.3% 31.6%;
    animation:splashOofIn .82s cubic-bezier(.18,1.38,.28,1) .04s both;
  }
  .splashOrganized {
    transform-origin:50.5% 50.9%;
    animation:splashOrganizedIn .88s cubic-bezier(.18,1.22,.25,1) .34s both;
  }
  .splashChaos {
    transform-origin:50.6% 69.0%;
    animation:splashChaosIn .88s cubic-bezier(.18,1.22,.25,1) .62s both;
  }
  .splashEye {
    z-index:4;
    transform-origin:66.3% 68.1%;
    filter:drop-shadow(0 7px 10px rgba(0,0,0,.65));
    animation:splashEyeIn .72s cubic-bezier(.16,1.48,.24,1) 1.02s both;
  }
  .splashEyeRestart {
    position:absolute; left:60.05%; top:61.94%; width:11.57%; height:11.30%;
    z-index:7; padding:0; border:0; border-radius:50%; background:transparent;
    cursor:pointer; appearance:none; -webkit-appearance:none; touch-action:manipulation;
  }
  .splashEyeRestart:focus-visible {
    outline:3px solid rgba(255,213,0,.8); outline-offset:4px;
    box-shadow:0 0 24px rgba(39,211,255,.5);
  }
  .splashOof img { animation:splashTinyFloat 4.8s ease-in-out 1.1s infinite; }
  .splashOrganized img { animation:splashTinyFloatAlt 5.1s ease-in-out 1.35s infinite; }
  .splashChaos img { animation:splashTinyFloat 5.4s ease-in-out 1.6s infinite; }
  .splashEye img { animation:splashEyeWiggle 3.4s ease-in-out 1.8s infinite; transform-origin:50% 58%; }
  @keyframes splashOofIn {
    0% { opacity:0; transform:translateY(-44%) scale(.78) rotate(-4deg); filter:blur(5px) drop-shadow(0 18px 20px rgba(0,0,0,.2)); }
    60% { opacity:1; transform:translateY(5%) scale(1.06) rotate(1.2deg); filter:blur(0) drop-shadow(0 18px 20px rgba(0,0,0,.72)); }
    80% { transform:translateY(-2%) scale(.985) rotate(-.5deg); }
    100% { opacity:1; transform:translateY(0) scale(1) rotate(0); filter:blur(0) drop-shadow(0 18px 20px rgba(0,0,0,.72)); }
  }
  @keyframes splashOrganizedIn {
    0% { opacity:0; transform:translateX(-15%) scale(.92) rotate(-1deg); filter:blur(4px) drop-shadow(0 18px 20px rgba(0,0,0,.2)); }
    72% { opacity:1; transform:translateX(1.4%) scale(1.025) rotate(.35deg); filter:blur(0) drop-shadow(0 18px 20px rgba(0,0,0,.72)); }
    100% { opacity:1; transform:translateX(0) scale(1) rotate(0); filter:blur(0) drop-shadow(0 18px 20px rgba(0,0,0,.72)); }
  }
  @keyframes splashChaosIn {
    0% { opacity:0; transform:translateX(15%) scale(.92) rotate(1.3deg); filter:blur(4px) drop-shadow(0 18px 20px rgba(0,0,0,.2)); }
    72% { opacity:1; transform:translateX(-1.2%) scale(1.025) rotate(-.35deg); filter:blur(0) drop-shadow(0 18px 20px rgba(0,0,0,.72)); }
    100% { opacity:1; transform:translateX(0) scale(1) rotate(0); filter:blur(0) drop-shadow(0 18px 20px rgba(0,0,0,.72)); }
  }
  @keyframes splashEyeIn {
    0% { opacity:0; transform:scale(.1) rotate(-70deg); filter:blur(3px) drop-shadow(0 7px 10px rgba(0,0,0,.2)); }
    62% { opacity:1; transform:scale(1.28) rotate(12deg); filter:blur(0) drop-shadow(0 7px 10px rgba(0,0,0,.65)); }
    82% { transform:scale(.92) rotate(-5deg); }
    100% { opacity:1; transform:scale(1) rotate(0); filter:blur(0) drop-shadow(0 7px 10px rgba(0,0,0,.65)); }
  }
  @keyframes splashStageBreathe {
    0%,100% { transform:translateY(0) scale(1); }
    50% { transform:translateY(-7px) scale(1.01); }
  }
  @keyframes splashTinyFloat {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-5px); }
  }
  @keyframes splashTinyFloatAlt {
    0%,100% { transform:translateY(0) rotate(0); }
    50% { transform:translateY(-4px) rotate(.18deg); }
  }
  @keyframes splashEyeWiggle {
    0%,100% { transform:translate(0,0) rotate(0) scale(1); }
    22% { transform:translate(.7px,-.5px) rotate(3.4deg) scale(1.012); }
    45% { transform:translate(-.5px,.45px) rotate(-2.4deg) scale(.998); }
    70% { transform:translate(.35px,0) rotate(1.5deg) scale(1.006); }
  }
  @keyframes splashAura {
    0%,100% { opacity:.58; transform:scale(.96); }
    50% { opacity:1; transform:scale(1.06); }
  }

</style>
</head>
<body>

<div id="splash">
  <div id="splashCard">
    <div id="splashTitle" aria-label="[OOF] Organized Chaos">
      <div class="splashPiece splashOof"><img src="icons/oof-splash-oof.webp" alt="[OOF]" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashOrganized"><img src="icons/oof-splash-organized.webp" alt="Organized" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashChaos"><img src="icons/oof-splash-chaos.webp" alt="Chaos" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashEye">
        <img src="icons/oof-splash-eye.webp" alt="" decoding="async" fetchpriority="high">
        <button id="splashEyeRestart" class="splashEyeRestart" type="button" aria-label="Restart splash animation" title="Restart splash animation"></button>
      </div>
    </div>
  </div>
</div>
<script>

  function hideSplash() {
    const splash = document.getElementById('splash');
    if (splash) splash.classList.add('hidden');
  }

  const splashLogoVideo = document.getElementById('splashLogo');
  if (splashLogoVideo && splashLogoVideo.tagName === 'VIDEO') {
    const tryPlaySplash = () => splashLogoVideo.play().catch(() => {});
    splashLogoVideo.muted = true;
    splashLogoVideo.playsInline = true;
    tryPlaySplash();
    window.addEventListener('pointerdown', tryPlaySplash, { once:true });
  }
  const splashEnter = document.getElementById('splashEnter');
  if (splashEnter) {
    splashEnter.addEventListener('click', hideSplash);
    window.setTimeout(() => splashEnter.focus(), 250);
  }
  function restartSplashAnimation() {
    const title = document.getElementById('splashTitle');
    if (!title) return;

    const clone = title.cloneNode(true);
    title.replaceWith(clone);

    const eyeRestart = clone.querySelector('#splashEyeRestart');
    if (eyeRestart) eyeRestart.focus({ preventScroll:true });
  }

  document.addEventListener('click', e => {
    const eyeRestart = e.target.closest && e.target.closest('#splashEyeRestart');
    if (!eyeRestart) return;

    e.preventDefault();
    e.stopPropagation();
    restartSplashAnimation();
  });

  window.addEventListener('keydown', e => {
    const eyeRestart = e.target.closest && e.target.closest('#splashEyeRestart');
    if (eyeRestart && (e.key === 'Enter' || e.key === ' ')) {
      e.preventDefault();
      restartSplashAnimation();
    }
  });

</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
