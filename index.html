<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>OOF Signature Splash</title>
<meta name="theme-color" content="#000000" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="stylesheet" href="oof-signature-splash.css" />
<style>
  html, body { margin:0; min-height:100%; background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; }
  .demoNote { position:fixed; left:12px; right:12px; bottom:10px; z-index:0; text-align:center; color:rgba(255,255,255,.45); font-size:12px; }
</style>
</head>
<body>

<!-- OOF SIGNATURE SPLASH START -->
<div id="splash">
  <div id="splashCard">
    <div id="splashTitle" aria-label="[OOF] Organized Chaos">
      <div class="splashPiece splashOof splashOofBracketLeft"><img src="icons/oof-splash-1.webp" alt="[" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashOof splashOofFirstO"><img src="icons/oof-splash-2.webp" alt="O" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashOof splashOofSecondO"><img src="icons/oof-splash-3.webp" alt="O" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashOof splashOofF"><img src="icons/oof-splash-4.webp" alt="F" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashOof splashOofBracketRight"><img src="icons/oof-splash-5.webp" alt="]" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashOrganized"><img src="icons/oof-splash-organized.webp" alt="Organized" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashChaos"><img src="icons/oof-splash-chaos.webp" alt="Chaos" decoding="async" fetchpriority="high"></div>
      <div class="splashPiece splashEye">
        <img src="icons/oof-splash-eye.webp" alt="" decoding="async" fetchpriority="high">
        <button id="splashEyeRestart" class="splashEyeRestart" type="button" aria-label="Restart OOF splash" title="Restart OOF splash"></button>
      </div>
    </div>
    <div id="splashSub"><i>LOADING ...</i></div>
    <div id="splashBar"><div id="splashFill"></div></div>
    <div id="splashCredit">2026 © PlatinumBoy</div>
  </div>
</div>
<!-- OOF SIGNATURE SPLASH END -->

<div class="demoNote"><i>Click the eye to replay the OOF signature splash.</i></div>
<script src="oof-signature-splash.js"></script>
</body>
</html>
